services:
  - type: web
    name: city-wallet-server
    runtime: image
    image:
      url: oven/bun:latest
    buildCommand: "cd server && bun install"
    startCommand: "cd server && bun run start"
    envVars:
      - key: SUPABASE_URL
        value: "https://ecydsayjmyrbkxthkfli.supabase.co"
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "3000"
    healthCheckPath: /health
